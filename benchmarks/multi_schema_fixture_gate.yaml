# Local multi-schema fixture benchmark gate.
# This is software/fixture breadth evidence, not provider or broad model benchmark evidence.
thresholds:
  require_rows: true
  require_traces: true
  min_rows: 4
  min_behavior_rows: 4
  min_traceable_case_rows: 29
  min_total_runs: 29
  min_models: 4
  min_schemas: 4
  min_schema_valid_rate: 1.0
  min_semantic_correct_rate: 1.0
  min_clean_json_rate: 1.0
  max_missing_trace_rows: 0
  max_uncheckable_result_rows: 0
  max_infra_failed_rows: 0
