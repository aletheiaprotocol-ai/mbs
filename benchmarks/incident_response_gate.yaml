# Incident response workflow fixture gate.
# Software/regression evidence only unless paired with real provider responses.
thresholds:
  require_rows: true
  require_traces: true
  min_rows: 1
  min_total_runs: 8
  min_models: 1
  min_schemas: 1
  min_schema_valid_rate: 0.95
  min_semantic_correct_rate: 0.95
  min_clean_json_rate: 1.0
  max_missing_trace_rows: 0
  max_uncheckable_result_rows: 0
  max_infra_failed_rows: 0
